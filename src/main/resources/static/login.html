<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in · API Test Generator</title>
  <style>
    :root { --bg:linear-gradient(180deg,#11333b,#06161b); --card:#ffffff; --border:rgba(255,255,255,0.1); --text:#0b2a30; --accent:#0f766e; }
    body { background: var(--bg); min-height:100vh; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; margin:0; display:flex; align-items:center; justify-content:center; color: var(--text); }
    .wrap { width:100%; padding:24px; display:flex; justify-content:center; }
    .card { width: min(400px, 100%); background: var(--card); border:1px solid var(--border); border-radius:16px; padding:28px 26px; box-shadow: 0 24px 60px rgba(0,0,0,.25); }
    .logo { display:flex; justify-content:center; margin-bottom:16px; }
    .logo svg { height:42px; width:auto; }
    h1 { margin:0 0 8px; font-size:22px; color: var(--text); text-align:center; }
    label { display:block; font-size:13px; color:#637b86; margin-bottom:6px; }
    input { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:10px; outline:none; }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(15,118,110,.18); }
    .row { margin-bottom:12px; }
    .btn { width:100%; padding:11px 12px; background: var(--accent); color:#fff; border:none; border-radius:10px; cursor:pointer; font-size:15px; margin-top:4px; }
    .btn:hover { filter:brightness(1.05); }
    .err { color:#9f2122; font-size:12px; margin-top: 8px; text-align:center; }
    .hint { color:#6b8591; font-size:12px; margin-top: 10px; text-align:center; }
  </style>
  <script>
    function onLoad(){
      const p = new URLSearchParams(location.search);
      if (p.get('error')){
        const el = document.getElementById('err');
        if (el) el.textContent = 'Invalid email or password';
      }
    }
  </script>
</head>
<body onload="onLoad()">
  <div class="wrap">
    <form class="card" method="post" action="/login">
      <div class="logo" style="font-size:14px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:#0f766e;">API QA Lab</div>
      <h1>Sign in</h1>
      <div class="row">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required />
      </div>
      <div class="row">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required />
      </div>
      <button class="btn" type="submit">Continue</button>
      <div id="err" class="err"></div>
      <div class="hint">Use <code>APP_LOGIN_EMAIL</code> and <code>APP_LOGIN_PASSWORD</code> to customize demo login.</div>
    </form>
  </div>
</body>
</html>
